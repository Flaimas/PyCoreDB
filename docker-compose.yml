services:
  postgres-db:
    image: postgres:16
    restart: always
    container_name: vpn_postgres_db
    environment:
      - POSTGRES_DB=users
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9.15.0
    depends_on:
      - postgres-db
    restart: always
    container_name: vpn_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=alexey.letov2001@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  data:
  pgadmin_data: